<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kakuro · комбинатор</title>
    <meta name="description" content="Подбор комбинаций для Какуро с фильтром по известным цифрам">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0c10">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="kakuro">
        <div class="hero">
            <h1>✦ kakuro combos</h1>
            <p>комбинации цифр 1–9 без повторений</p>
        </div>

        <div class="panel">
            <div class="controls">
                <div class="control">
                    <label>сумма</label>
                    <input type="text" id="sumInput" placeholder="14" inputmode="numeric" value="14">
                </div>
                <div class="control">
                    <label>клеток</label>
                    <input type="text" id="cellsInput" placeholder="3" inputmode="numeric" value="3">
                </div>
            </div>

            <!-- НОВЫЙ БЛОК ФИЛЬТРАЦИИ -->
            <div class="filter-section">
                <div class="filter-header">
                    <span class="filter-label">фильтр по цифрам</span>
                    <span class="filter-hint">⏎ кликните ещё раз, чтобы снять</span>
                </div>
                <div class="digits-panel" id="digitsPanel">
                    <button type="button" class="digit-btn" data-digit="1">1</button>
                    <button type="button" class="digit-btn" data-digit="2">2</button>
                    <button type="button" class="digit-btn" data-digit="3">3</button>
                    <button type="button" class="digit-btn" data-digit="4">4</button>
                    <button type="button" class="digit-btn" data-digit="5">5</button>
                    <button type="button" class="digit-btn" data-digit="6">6</button>
                    <button type="button" class="digit-btn" data-digit="7">7</button>
                    <button type="button" class="digit-btn" data-digit="8">8</button>
                    <button type="button" class="digit-btn" data-digit="9">9</button>
                </div>
            </div>

            <div class="result-section">
                <div class="badge">✧ возможные варианты</div>
                <div id="comboList" class="combo-grid"></div>
                <div id="rangeInfo" class="info-hint"></div>
            </div>
        </div>
        <footer>
            pwa ready · офлайн · для какуро
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
